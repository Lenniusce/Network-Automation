---

- name: Take out Trash
  file:
# dest using a special variable https://docs.ansible.com/projects/ansible/latest/reference_appendices/special_variables.html
    path: '$PWD/../../generated_configs/{{ inventory_hostname }}.txt'
    state: absent
  delegate_to: localhost


- name: Create New Configs
  ansible.builtin.template:
    src: 'nxos.j2'
# dest using a special variable https://docs.ansible.com/projects/ansible/latest/reference_appendices/special_variables.html
    dest: '$PWD/../../generated_configs/{{ inventory_hostname }}.txt'
    lstrip_blocks:  yes
  delegate_to: localhost
